<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ember — Traductions</title>

  <link href="https://fonts.googleapis.com/css?family=Noto+Sans:400,700,400italic,700italic" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Lora:700" rel="stylesheet" />

  <link rel="stylesheet" href="css/ember.css" />

  <style>
    /* ── Indicateur realtime ── */
    #realtime-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #888;
      margin-left: 8px;
      vertical-align: middle;
      transition: background .3s;
      cursor: default;
    }
    #realtime-dot.connected { background: #4caf50; }

    /* ── Bouton filtre "À voter" ── */
    .filter-toggle {
      padding: 6px 14px;
      border: 1px solid var(--border, #ccc);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-size: .85rem;
      color: inherit;
      white-space: nowrap;
      transition: background .15s, color .15s;
    }
    .filter-toggle.active {
      background: var(--accent, #e07b39);
      color: #fff;
      border-color: var(--accent, #e07b39);
    }
    /* Toolbar avec flex pour aligner search + toggle */
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    .toolbar .search-input { flex: 1; }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- En-tête -->
  <header class="page-header">
    <h1>
      Ember — Traductions
      <span id="realtime-dot" title="Connexion temps réel…"></span>
    </h1>
    <p class="subtitle">
      Votez pour les meilleures traductions des termes spécifiques à la campagne Ember.
    </p>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="num" id="stat-total">—</div>
      <div class="lbl">Termes</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-decided">—</div>
      <div class="lbl">Décidés</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-votes">—</div>
      <div class="lbl">Votes au total</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-myvotes">—</div>
      <div class="lbl">Mes votes</div>
    </div>
  </div>

  <!-- Barre d'outils : recherche + filtre "À voter" -->
  <div class="toolbar" id="toolbar">
    <input class="search-input" id="search-input" type="text"
           placeholder="Rechercher un terme ou une traduction…" />
    <!-- Le bouton "À voter" est injecté ici par app.js -->
  </div>

  <!-- Filtres catégorie -->
  <div class="category-filters" id="category-filters"></div>

  <!-- Liste des termes -->
  <div id="terms-list">
    <p class="no-results">Chargement…</p>
  </div>

  <!-- Pied de page -->
  <footer class="page-footer">
    Projet Ember · Votes et propositions partagés via Supabase.
    Chaque navigateur a un identifiant anonyme — un seul vote par terme.
  </footer>

</div>

<!-- Supabase (doit être chargé AVANT votes.js) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- Données -->
<script src="js/data.js"></script>
<!-- Logique de vote (Supabase) -->
<script src="js/votes.js?v=2"></script>
<!-- Rendu -->
<script src="js/app.js"></script>

</body>
</html>
